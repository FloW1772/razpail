name: memo_anniversaires
description: "Mémo Anniversaires — rappels d'anniversaires 100% hors ligne."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications locales
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utilitaires
  uuid: ^4.4.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
